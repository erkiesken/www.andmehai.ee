<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>andmehai</title>
<style>
  html, body {

    background: #0a0a0a;
    color: #f2f2f2;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  .art {
    container-type: inline-size;
    width: min(80vw, 1000px);
  }
  p {
    margin: 0;
    font-family: monospace;
    text-align: left;
    line-height: 1.2;
    font-size: 15cqw;
  }
  .fin {
    display: inline-block;
    position: relative;
    bottom: -0.75ex;
    left: -0.3ex;
    font-size: 18cqw;
  }
  .tail {
    display: inline-block;
    position: relative;
    bottom: -0.2ex;
  }
  .bottom-fins {
    display: inline-block;
    position: relative;
    top: -0.6ex;
  }
</style>
</head>
<body>
<div class="art">
  <p>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="fin">&#916;</span><br>
    <span class="tail">&gt;&lt;</span>andmehai<span class="head">&#8805;</span><br>
    &nbsp;&nbsp;&nbsp;<span class="bottom-fins">&#8217;&nbsp;&nbsp;&nbsp;&#8221;</span>
  </p>
</div>
</body>
</html>
